services:
  - type: web
    name: quantum-ai-backend
    runtime: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python ../create_dummy_models.py
    # Single worker keeps RAM under the free-tier 512 MB cap while we load
    # three sklearn models. --timeout-keep-alive 30 avoids premature drops.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 30
    # /livez is zero-dependency and answers 200 the moment uvicorn binds;
    # /health still works but reports model/DB readiness as background flags.
    healthCheckPath: /livez
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.5"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MONGO_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
